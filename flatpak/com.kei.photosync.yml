app-id: com.kei.photosync
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: kei-photosync
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: kei-photosync
    buildsystem: simple
    build-commands:
      - install -Dm755 kei-photosync /app/bin/kei-photosync
      - install -Dm755 kei-x86_64-unknown-linux-gnu /app/bin/kei-x86_64-unknown-linux-gnu
      - install -Dm644 com.kei.photosync.desktop /app/share/applications/com.kei.photosync.desktop
      - install -Dm644 icon.png /app/share/icons/hicolor/512x512/apps/com.kei.photosync.png
    sources:
      - type: file
        path: ../build-staging/kei-photosync
      - type: file
        path: ../build-staging/kei-x86_64-unknown-linux-gnu
      - type: file
        path: com.kei.photosync.desktop
      - type: file
        path: ../src-tauri/icons/128x128.png
        dest-filename: icon.png
