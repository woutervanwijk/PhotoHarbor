# Builds Kei PhotoSync for macOS (universal), Windows, and Linux.
# On push to main: build only.
# On tag v*: build + create a draft GitHub Release with all artifacts.

name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.artifact_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest       # Apple Silicon runner; builds universal binary
            artifact_name: macos
          - os: windows-latest
            artifact_name: windows
          - os: ubuntu-22.04       # glibc 2.35 — broader Linux compatibility
            artifact_name: linux

    steps:
      - uses: actions/checkout@v4

      # ── Node ──────────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      # ── Rust ──────────────────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal build needs both targets installed
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          key: ${{ matrix.os }}

      # ── Linux system dependencies ─────────────────────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf file

      # ── Sidecar binary ────────────────────────────────────────────────────────
      # macOS universal: need both arch variants in src-tauri/binaries/
      - name: Prepare sidecar (macOS arm64)
        if: matrix.os == 'macos-latest'
        run: node scripts/prepare-sidecar.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_TARGET_TRIPLE: aarch64-apple-darwin

      - name: Prepare sidecar (macOS x86_64)
        if: matrix.os == 'macos-latest'
        run: node scripts/prepare-sidecar.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_TARGET_TRIPLE: x86_64-apple-darwin

      - name: Prepare sidecar
        if: matrix.os != 'macos-latest'
        run: node scripts/prepare-sidecar.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Build ─────────────────────────────────────────────────────────────────
      # beforeBuildCommand in tauri.conf.json also calls prepare-sidecar, but
      # it will exit early ("Sidecar already present") since we ran it above.
      - name: Build (macOS universal)
        if: matrix.os == 'macos-latest'
        run: npm run build -- --target universal-apple-darwin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        if: matrix.os != 'macos-latest'
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Collect artifacts ─────────────────────────────────────────────────────
      - name: Collect macOS artifacts
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p artifacts
          cp src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg artifacts/

      - name: Collect Windows artifacts
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item src-tauri\target\release\bundle\msi\*.msi artifacts\
          Copy-Item src-tauri\target\release\bundle\nsis\*.exe artifacts\

      - name: Collect Linux artifacts
        if: matrix.os == 'ubuntu-22.04'
        run: |
          mkdir -p artifacts
          cp src-tauri/target/release/bundle/appimage/*.AppImage artifacts/
          cp src-tauri/target/release/bundle/deb/*.deb artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/
          retention-days: 7
          if-no-files-found: error

  # ── Release ───────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Flatten artifacts into one directory
        run: mkdir -p dist && find release-artifacts/ -type f | xargs -I{} cp {} dist/

      - name: Create draft GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Kei PhotoSync ${{ github.ref_name }}" \
            --generate-notes \
            --draft \
            dist/*
