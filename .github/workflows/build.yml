# Builds Kei PhotoSync for macOS (universal), Windows, and Linux.
# On push to main: build only.
# On tag v*: build + create a draft GitHub Release with all artifacts.

name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform (leave empty for all)"
        required: false
        default: ""
        type: choice
        options: ["", "macos", "windows", "linux"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.artifact_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest       # Apple Silicon runner; builds universal binary
            artifact_name: macos
          - os: windows-latest
            artifact_name: windows
          - os: ubuntu-22.04       # glibc 2.35 — broader Linux compatibility
            artifact_name: linux

    if: >
      github.event_name != 'workflow_dispatch' ||
      inputs.platform == '' ||
      inputs.platform == matrix.artifact_name

    steps:
      - uses: actions/checkout@v4

      # ── Node ──────────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      # ── Rust ──────────────────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal build needs both targets installed
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          key: ${{ matrix.os }}

      # ── Linux system dependencies ─────────────────────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf file

      # ── Sidecar binary ────────────────────────────────────────────────────────
      # macOS universal: need both arch variants in src-tauri/binaries/
      - name: Prepare sidecar (macOS arm64)
        if: matrix.os == 'macos-latest'
        run: node scripts/prepare-sidecar.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_TARGET_TRIPLE: aarch64-apple-darwin

      - name: Prepare sidecar (macOS x86_64)
        if: matrix.os == 'macos-latest'
        run: node scripts/prepare-sidecar.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_TARGET_TRIPLE: x86_64-apple-darwin

      - name: Combine sidecars into universal binary
        if: matrix.os == 'macos-latest'
        run: |
          lipo -create \
            src-tauri/binaries/kei-aarch64-apple-darwin \
            src-tauri/binaries/kei-x86_64-apple-darwin \
            -output src-tauri/binaries/kei-universal-apple-darwin
          chmod +x src-tauri/binaries/kei-universal-apple-darwin

      - name: Prepare sidecar
        if: matrix.os != 'macos-latest'
        run: node scripts/prepare-sidecar.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Build ─────────────────────────────────────────────────────────────────
      # beforeBuildCommand in tauri.conf.json also calls prepare-sidecar, but
      # it will exit early ("Sidecar already present") since we ran it above.
      - name: Build (macOS universal)
        if: matrix.os == 'macos-latest'
        run: npm run build -- --target universal-apple-darwin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        if: matrix.os != 'macos-latest'
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Collect artifacts ─────────────────────────────────────────────────────
      - name: Collect macOS artifacts
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p artifacts
          cp src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg artifacts/

      - name: Collect Windows artifacts
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item src-tauri\target\release\bundle\msi\*.msi artifacts\
          Copy-Item src-tauri\target\release\bundle\nsis\*.exe artifacts\

      - name: Collect Linux artifacts
        if: matrix.os == 'ubuntu-22.04'
        run: |
          mkdir -p artifacts
          cp src-tauri/target/release/bundle/appimage/*.AppImage artifacts/
          cp src-tauri/target/release/bundle/deb/*.deb artifacts/

      # ── Flatpak (disabled for now) ────────────────────────────────────────────
      # - name: Cache Flatpak runtime
      #   if: matrix.os == 'ubuntu-22.04'
      #   uses: actions/cache@v4
      #   with:
      #     path: ~/.local/share/flatpak
      #     key: flatpak-gnome-47
      #
      # - name: Install Flatpak runtime
      #   if: matrix.os == 'ubuntu-22.04'
      #   run: |
      #     flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
      #     flatpak install --user -y --noninteractive flathub org.gnome.Platform//47 org.gnome.Sdk//47 \
      #       || flatpak update --user -y --noninteractive
      #
      # - name: Build Flatpak
      #   if: matrix.os == 'ubuntu-22.04'
      #   run: |
      #     mkdir -p build-staging
      #     cp src-tauri/target/release/kei-photosync build-staging/
      #     cp src-tauri/binaries/kei-x86_64-unknown-linux-gnu build-staging/
      #     flatpak-builder --force-clean --user \
      #       flatpak-build-dir flatpak/com.kei.photosync.yml
      #     flatpak build-export flatpak-repo flatpak-build-dir
      #     flatpak build-bundle flatpak-repo \
      #       artifacts/kei-photosync.flatpak com.kei.photosync

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/
          retention-days: 7
          if-no-files-found: error

  # ── Release ───────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Flatten artifacts into one directory
        run: mkdir -p dist && find release-artifacts/ -type f | xargs -I{} cp {} dist/

      - name: Create draft GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Kei PhotoSync ${{ github.ref_name }}" \
            --generate-notes \
            --draft \
            dist/*
